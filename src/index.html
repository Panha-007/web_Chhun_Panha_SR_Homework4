<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="output.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.min.css" />
</head>

<body class="bg-cyan-100">
    <div class="flex w-4xl m-auto mt-20">
        <div class="flex w-full items-center justify-between">
            <h1 class="font-bold text-4xl">Task List</h1>
            <div class="text-white font-bold text-1xl bg-purple-800 px-7 py-2 rounded-2xl">
                <button class="rounded-2xl" id="open-btn">Add Task</button>
            </div>
        </div>
    </div>
    <div class="flex bg-white w-4xl m-auto mt-10 shadow-md shadow-gray-300-100 py-7 rounded-2xl">
        <div class="font-bold w-1/2 text-cyan-300 text-xl flex ml-5">
            <p>Task</p>
        </div>
        <div class="w-1/2 font-bold text-cyan-300 text-xl flex justify-evenly gap-20">
            <p>Priority</p>
            <p>Status</p>
            <p class="text-orange-500">Action</p>
        </div>
    </div>

    <dialog class="bg-white shadow-md shadow-gray-300-100 w-150 m-auto my-10 h-110 rounded-xl" id="modal">
        <div class="flex justify-between ml-7 mr-7">
            <h1 class="font-bold text-2xl mt-5">Add Task</h1>
            <button id="close" class="mt-5">
                <svg xmlns="http://www.w3.org/2000/svg" height="34px" viewBox="0 -960 960 960" width="49px" fill="red">
                    <path
                        d="m336-280 144-144 144 144 56-56-144-144 144-144-56-56-144 144-144-144-56 56 144 144-144 144 56 56ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z" />
                </svg>
            </button>
        </div>
        <div class="mt-5">
            <form action="submit">
                <div class="ml-7 mb-3">
                    <label for="task" class="text-xl font-black">Task</label> <br />
                    <input type="text" placeholder="add task"
                        class="mt-3 border-3 border-cyan-400 w-85 py-2 px-2 rounded-lg" />
                </div>
                <div class="ml-7">
                    <label for="" class="text-xl font-black">Priority</label><br />
                    <div class="px-4 py-3 font-bold flex w-85 justify-around">
                        <button type="button" 
                            class="prty-btn border-2 border-red-400 text-red-400 px-5 py-2 rounded-xl hover:bg-red-300 hover:text-white transition-all duration-700">
                            High
                        </button>
                        <button type="button" 
                            class="prty-btn border-2 border-orange-200 text-orange-200 px-5 py-2 rounded-xl hover:bg-orange-300 hover:text-white transition-all duration-700">
                            Medium
                        </button>
                        <button type="button" 
                            class="prty-btn border-2 border-green-400 text-green-600 px-5 py-2 rounded-xl hover:bg-green-300 hover:text-white transition-all duration-700">
                            Low
                        </button>
                    </div>
                </div>
                <div class="ml-7">
                    <label for="" class="text-xl font-black">Status</label><br />
                    <div class="px-4 py-3 font-bold flex w-85 justify-around">
                        <button type="button" 
                            class="stt-btn border-2 border-blue-400 text-blue-300 px-5 py-2 rounded-xl hover:bg-blue-300 hover:text-white">
                            To Do
                        </button>
                        <button type="button"
                            class="stt-btn border-2 border-blue-400 text-blue-300 px-5 py-2 rounded-xl hover:bg-blue-300 hover:text-white">
                            Progress
                        </button>
                        <button type="button" 
                            class="stt-btn border-2 border-blue-400 text-blue-300 px-5 py-2 rounded-xl hover:bg-blue-300 hover:text-white">
                            Done
                        </button>
                    </div>
                </div>
                <div class="flex justify-center">
                    <div class="ml-auto mr-7 mt-4 text-white font-bold bg-purple-800 px-7 py-2 rounded-2xl w-fit">
                        <button id="add" type="button">Add</button>
                    </div>
                </div>
            </form>
        </div>
    </dialog>

    <dialog id="delete-modal" class="bg-white p-6 rounded-xl shadow-xl m-auto">
    <h2 class="text-xl font-bold mb-4">Are you sure?</h2>
    <p class="mb-6">Do you really want to delete this task? This action cannot be undone.</p>
    <div class="flex justify-end gap-4">
        <button id="cancel-delete-btn" class="px-4 py-2 bg-gray-200 rounded-lg">Cancel</button>
        <button id="confirm-delete-btn" class="px-4 py-2 bg-red-500 text-white rounded-lg">Delete</button>
    </div>
</dialog>

    
    <script src="actionTask.js"></script>
</body>

</html>
